name = "command-center"
type = "javascript"
account_id = ""
workers_dev = true
route = ""
zone_id = ""
main = "dist/index.js"

[env.production]
name = "command-center-prod"
route = "espacios.me/coms"
zone_id = ""

[build]
command = "pnpm build"
cwd = "./"
watch_paths = ["client/src/**/*.tsx", "server/**/*.ts"]

[build.upload]
format = "service-worker"

[env.development]
name = "command-center-dev"
workers_dev = true

# Environment variables
[env.production.vars]
DATABASE_URL = ""
VITE_FRONTEND_FORGE_API_URL = "https://espacios.me/coms"
VITE_FRONTEND_FORGE_API_KEY = ""

[env.development.vars]
DATABASE_URL = ""
VITE_FRONTEND_FORGE_API_URL = "http://localhost:3000"
VITE_FRONTEND_FORGE_API_KEY = ""

# KV Namespace bindings (for future use)
[[kv_namespaces]]
binding = "CACHE"
id = ""
preview_id = ""

# D1 Database bindings (for future use)
[[d1_databases]]
binding = "DB"
database_name = "command-center"
database_id = ""
preview_database_id = ""
